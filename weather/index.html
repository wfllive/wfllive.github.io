<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherIO - Погода онлайн</title>
    <meta name="title" content="Meteo Live Web">
    <meta name="description" content="Meteo Live Web - Современное приложение погоды">
    
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <script src="./assets/js/app.js" type="module"></script>
    <script src="./assets/js/route.js" type="module"></script>
  </head>
  <body>
    
    <!-- Animated Background Particles -->
    <div class="bg-particles">
      <div class="particle particle-1"></div>
      <div class="particle particle-2"></div>
      <div class="particle particle-3"></div>
      <div class="particle particle-4"></div>
      <div class="particle particle-5"></div>
      <div class="particle particle-6"></div>
    </div>
    
    <header class="header">
      <div class="container">
        
        <a href="#" class="logo">
          <img src="./assets/images/logo2.png" width="96" height="96" alt="logo" />
        </a>
        
        <div class="search-view" data-search-view>
          
          <div class="search-wrapper">
            <input type="search" name="search" placeholder="Поиск города..." autocomplete="off" class="search-field" data-search-field>
            
            <span class="m-icon leading-icon">search</span>
            
            <button class="icon-btn leading-icon has-state" aria-label="закрыть поиск" data-search-toggler>
              <span class="m-icon">arrow_back</span>
            </button>
          </div>
          
          <div class="search-result" data-search-result></div>
          
        </div>
        
        <div class="header-actions">
          
          <button class="icon-btn has-state" aria-label="открыть поиск" data-search-toggler>
            <span class="m-icon icon">search</span>
          </button>
          
          <a href="#/current-location" class="btn-primary has-state" data-current-location-btn>
            <span class="m-icon">my_location</span>
            <span class="span">Моё местоположение</span>
          </a>
          
        </div>
        
      </div>
    </header>
    
    <main>
      <article class="container" data-container>
        
        <div class="content-left">
          
          <section class="section current-weather" aria-label="текущая погода" data-current-weather></section>
          
          <section class="section forecast" aria-labelledby="forecast-label" data-5-day-forecast></section>
        </div>
        
        <div class="content-right">
          
          <section class="section highlights" aria-labelledby="highlights-label" data-highlights></section>
          
          <section class="section hourly-forecast" aria-label="почасовой прогноз" data-hourly-forecast></section>
          
          <footer class="footer">
            <p class="body-3">
              © 2024 WeatherIO
            </p>
            <p class="body-3">
              Работает на
              <a href="https://openweathermap.org/api" title="OpenWeatherMap" target="_blank" rel="noopener">
                <img src="./assets/images/openweather.png" width="150" height="30" loading="lazy" alt="OpenWeather">
              </a>
            </p>
          </footer>
        </div>
        
        <div class="loading" data-loading>
          <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <span class="m-icon loading-icon">cloud</span>
          </div>
        </div>
        
      </article>
    </main>
    
    <section class="error-content" data-error-content>
      <div class="error-inner">
        <span class="m-icon error-icon">cloud_off</span>
        <h2 class="heading">404</h2>
        <p class="body-1">Страница не найдена!</p>
        <a href="#/weather?lat=51.5073219&lon=-0.1276474" class="btn-primary has-state">
          <span class="m-icon">home</span>
          <span class="span">На главную</span>
        </a>
      </div>
    </section>
    
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  </body>
</html>
