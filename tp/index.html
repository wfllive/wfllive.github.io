        const { useState, useEffect, useRef } = React;

        function LightningCanvas() {
            const canvasRef = useRef(null);
            const flashRef = useRef(null);
            const boltsRef = useRef([]);
            const lastBoltRef = useRef(0);

            class LightningBolt {
                constructor(w, h) {
                    this.x = Math.random() * w;
                    this.y = 0;
                    this.segments = [];
                    this.alpha = 1;
                    this.fadeSpeed = 0.02 + Math.random() * 0.03;
                    this.active = true;
                    this.generate(w, h);
                }
                generate(w, h) {
                    let x = this.x, y = this.y;
                    const endY = h * (0.4 + Math.random() * 0.5);
                    const steps = 15 + Math.floor(Math.random() * 20);
                    this.segments = [];
                    for (let i = 0; i < steps; i++) {
                        const nx = x + (Math.random() - 0.5) * 80;
                        const ny = y + (endY - this.y) / steps;
                        this.segments.push({ x1: x, y1: y, x2: nx, y2: ny });
                        if (Math.random() < 0.25 && i > 3) {
                            let bx = nx, by = ny;
                            const dir = Math.random() < 0.5 ? -1 : 1;
                            for (let j = 0; j < 2 + Math.floor(Math.random() * 4); j++) {
                                const nbx = bx + dir * (10 + Math.random() * 30);
                                const nby = by + 10 + Math.random() * 20;
                                this.segments.push({ x1: bx, y1: by, x2: nbx, y2: nby, branch: true });
                                bx = nbx; by = nby;
                            }
                        }
                        x = nx; y = ny;
                    }
                }
                draw(ctx) {
                    if (!this.active) return;
                    this.segments.forEach(s => {
                        const w = s.branch ? 1 : 2;
                        const a = s.branch ? this.alpha * 0.4 : this.alpha;
                        ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
                        ctx.strokeStyle = `rgba(180,210,255,${a})`; ctx.lineWidth = w; ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
                        ctx.strokeStyle = `rgba(100,160,255,${a * 0.3})`; ctx.lineWidth = w + 6; ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
                        ctx.strokeStyle = `rgba(74,130,255,${a * 0.1})`; ctx.lineWidth = w + 16; ctx.stroke();
                    });
                    this.alpha -= this.fadeSpeed;
                    if (this.alpha <= 0) this.active = false;
                }
            }

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                const flash = () => {
                    const el = flashRef.current;
                    if (!el) return;
                    el.style.opacity = '1';
                    setTimeout(() => { el.style.opacity = '0'; }, 80);
                    setTimeout(() => { el.style.opacity = '1'; setTimeout(() => { el.style.opacity = '0'; }, 50); }, 120);
                };
                const loop = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const now = Date.now();
                    if (now - lastBoltRef.current > 2000 + Math.random() * 6000) {
                        boltsRef.current.push(new LightningBolt(canvas.width, canvas.height));
                        flash();
                        lastBoltRef.current = now;
                        if (Math.random() < 0.3) {
                            setTimeout(() => { boltsRef.current.push(new LightningBolt(canvas.width, canvas.height)); flash(); }, 100 + Math.random() * 200);
                        }
                    }
                    boltsRef.current = boltsRef.current.filter(b => b.active);
                    boltsRef.current.forEach(b => b.draw(ctx));
                    requestAnimationFrame(loop);
                };
                loop();
                return () => window.removeEventListener('resize', resize);
            }, []);

            return (
                <>
                    <canvas ref={canvasRef} className="fixed inset-0 z-0 pointer-events-none" />
                    <div ref={flashRef} className="fixed inset-0 z-[1] pointer-events-none opacity-0 transition-opacity duration-[50ms]"
                        style={{ background: 'radial-gradient(ellipse at center, rgba(180,200,255,0.08) 0%, transparent 70%)' }} />
                </>
            );
        }

        function Rain() {

            }));

                    {drops.map(d => (
                        <div key={d.id} className="absolute w-px rain-drop"
                            style={{ left: d.left+'%', height: d.height+'px', animationDuration: d.duration+'s', animationDelay: d.delay+'s', opacity: d.opacity, background: 'linear-gradient(180deg, transparent, rgba(140,170,220,0.3))' }} />
                    ))}
                </div>
            );
        }

        function useFadeUp() {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) el.classList.add('visible'); }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return ref;
        }
